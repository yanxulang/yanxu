name: Auto Release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  quality:
    name: 发布前完整质量门禁
    uses: ./.github/workflows/quality.yml
    with:
      ref: ${{ github.sha }}

  prepare:
    name: 检测版本并创建标签
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      should_release: ${{ steps.release.outputs.should_release }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: 校验版本并创建缺失标签
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "yanxu") | .version')"
          tag="v$version"
          if ! grep -Fqx "## $version" CHANGELOG.md; then
            echo "CHANGELOG.md 缺少 ## $version，拒绝自动发布" >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            git fetch origin "refs/tags/$tag:refs/tags/$tag"
            tagged_commit="$(git rev-list -n 1 "$tag")"
            if [[ "$tagged_commit" != "$GITHUB_SHA" ]]; then
              echo "版本 $version 已由另一提交发布；请先更新版本号" >&2
              exit 1
            fi
            if release_state="$(gh release view "$tag" \
              --json isDraft,isPrerelease \
              --jq '"\(.isDraft) \(.isPrerelease)"' 2>/dev/null)"; then
              if [[ "$release_state" == "false false" ]]; then
                should_release=false
              else
                should_release=true
              fi
            else
              should_release=true
            fi
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$tag" -m "言序 $version"
            git push origin "$tag"
            # 仓库令牌创建的标签不会递归触发工作流，直接复用完整发布门禁。
            should_release=true
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "should_release=$should_release" >> "$GITHUB_OUTPUT"

  release:
    name: 发布新版本
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    permissions:
      contents: write
      id-token: write
      attestations: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.prepare.outputs.tag }}
    secrets: inherit
