name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"
  workflow_dispatch:
    inputs:
      tag:
        description: 已存在的版本标签（如 v1.0.0）
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: 已存在的版本标签
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    name: 校验版本标签
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      commit: ${{ steps.version.outputs.commit }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref_name }}
      - name: 核对 Cargo、标签、主分支与变更记录
        id: version
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="${REQUESTED_TAG:-$GITHUB_REF_NAME}"
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "yanxu") | .version')"
          package_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "yanxu-package") | .version')"
          tree_sitter_version="$(jq -r '.version' tree-sitter-yanxu/package.json)"
          if [[ "$tag" != "v$version" ]]; then
            echo "标签 $tag 与 Cargo 版本 $version 不一致" >&2
            exit 1
          fi
          if [[ "$package_version" != "$version" || "$tree_sitter_version" != "$version" ]]; then
            echo "核心 $version、共享包 $package_version、Tree-sitter $tree_sitter_version 版本不一致" >&2
            exit 1
          fi
          git fetch origin main --tags
          tag_commit="$(git rev-list -n 1 "$tag")"
          main_commit="$(git rev-parse origin/main)"
          if [[ "$tag_commit" != "$main_commit" ]]; then
            echo "标签 $tag 的提交 $tag_commit 不是 origin/main 验收提交 $main_commit" >&2
            exit 1
          fi
          if ! grep -Fqx "## $version" CHANGELOG.md; then
            echo "CHANGELOG.md 缺少 ## $version" >&2
            exit 1
          fi
          {
            echo "tag=$tag"
            echo "version=$version"
            echo "commit=$tag_commit"
          } >> "$GITHUB_OUTPUT"

  quality:
    name: 标签提交完整质量门禁
    needs: validate
    uses: ./.github/workflows/quality.yml
    with:
      ref: refs/tags/${{ needs.validate.outputs.tag }}

  dynamic-safety:
    name: 标签提交动态安全门禁
    needs: validate
    uses: ./.github/workflows/dynamic-safety.yml
    with:
      ref: refs/tags/${{ needs.validate.outputs.tag }}

  create-release:
    name: 创建 Release
    needs: [validate, quality, dynamic-safety]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ needs.validate.outputs.tag }}
      - name: 检查 Release 是否已存在
        id: existing
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: 从变更记录创建 Release
        if: steps.existing.outputs.exists != 'true'
        uses: taiki-e/create-gh-release-action@eba8ea96c86cca8a37f1b56e94b4d13301fba651 # v1
        with:
          ref: refs/tags/${{ needs.validate.outputs.tag }}
          changelog: CHANGELOG.md
          title: 言序 ${{ needs.validate.outputs.version }}
          draft: true
          branch: main

  binaries:
    name: ${{ matrix.target }}
    needs: [validate, quality, create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ needs.validate.outputs.tag }}
      - name: 构建并上传二进制与校验和
        uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1
        with:
          bin: yanxu
          target: ${{ matrix.target }}
          archive: yanxu-$target
          include: LICENSE README.md
          checksum: sha256
          locked: true
          ref: refs/tags/${{ needs.validate.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: 在目标架构运行发行二进制
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          suffix=""
          if [[ "$RUNNER_OS" == "Windows" ]]; then suffix=".exe"; fi
          binary="target/$TARGET/release/yanxu$suffix"
          test -f "$binary"
          if [[ "$RUNNER_OS" != "Windows" ]]; then test -x "$binary"; fi
          test "$("$binary" --version | tr -d '\r')" = "言序 $VERSION"
      - name: 核对 Windows 发行运行时栈保留量
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
        run: |
          $bytes = [IO.File]::ReadAllBytes("target/$env:TARGET/release/yanxu.exe")
          $peOffset = [int][BitConverter]::ToUInt32($bytes, 0x3c)
          $optionalHeader = $peOffset + 24
          $magic = [BitConverter]::ToUInt16($bytes, $optionalHeader)
          if ($magic -ne 0x20b) { throw "发行运行时不是 PE32+" }
          $stackReserve = [BitConverter]::ToUInt64($bytes, $optionalHeader + 0x48)
          if ($stackReserve -lt 8MB) {
            throw "Windows 发行运行时栈只保留 $stackReserve 字节"
          }
      - name: 生成并上传目标构建元数据
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ needs.validate.outputs.tag }}
          TARGET: ${{ matrix.target }}
          YANXU_SOURCE_REF: refs/tags/${{ needs.validate.outputs.tag }}
        run: |
          set -euo pipefail
          asset_dir="target/release-metadata/$TARGET"
          mkdir -p "$asset_dir"
          gh release download "$TAG" --repo "$REPOSITORY" --pattern "yanxu-$TARGET.*" --dir "$asset_dir"
          case "$TARGET" in
            *windows*) archive="$asset_dir/yanxu-$TARGET.zip"; binary="target/$TARGET/release/yanxu.exe" ;;
            *) archive="$asset_dir/yanxu-$TARGET.tar.gz"; binary="target/$TARGET/release/yanxu" ;;
          esac
          checksum="$asset_dir/yanxu-$TARGET.sha256"
          test -f "$archive"
          test -f "$checksum"
          expected="$(awk 'NR == 1 {print $1}' "$checksum" | tr '[:upper:]' '[:lower:]')"
          if command -v sha256sum >/dev/null 2>&1; then
            actual="$(sha256sum "$archive" | awk '{print $1}')"
          else
            actual="$(shasum -a 256 "$archive" | awk '{print $1}')"
          fi
          test "$expected" = "$actual"
          metadata="$asset_dir/yanxu-$TARGET.build.json"
          scripts/generate-build-metadata.sh "$TARGET" "$archive" "$binary" "$metadata"
          gh release upload "$TAG" "$metadata" --repo "$REPOSITORY" --clobber

  supply-chain:
    name: SBOM 与构建证明
    needs: [validate, binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ needs.validate.outputs.tag }}
      - name: 安装 SBOM 工具
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-cyclonedx@0.5.9
      - name: 汇总目标制品并生成 SBOM
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ needs.validate.outputs.tag }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          release_dir="$RUNNER_TEMP/release"
          mkdir -p "$release_dir"
          gh release download "$TAG" --repo "$REPOSITORY" --dir "$release_dir" \
            --pattern 'yanxu-*.tar.gz' \
            --pattern 'yanxu-*.zip' \
            --pattern 'yanxu-*.sha256' \
            --pattern 'yanxu-*.build.json'
          test "$(find "$release_dir" -maxdepth 1 -type f | wc -l)" -eq 18
          scripts/generate-sbom.sh "$release_dir/yanxu-$VERSION.cdx.json"
      - name: 创建构建来源证明
        id: provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            ${{ runner.temp }}/release/*.tar.gz
            ${{ runner.temp }}/release/*.zip
            ${{ runner.temp }}/release/*.build.json
            ${{ runner.temp }}/release/*.cdx.json
      - name: 创建 SBOM 证明
        id: sbom
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            ${{ runner.temp }}/release/*.tar.gz
            ${{ runner.temp }}/release/*.zip
          sbom-path: ${{ runner.temp }}/release/yanxu-${{ needs.validate.outputs.version }}.cdx.json
      - name: 上传 SBOM 与可下载证明
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ needs.validate.outputs.tag }}
          VERSION: ${{ needs.validate.outputs.version }}
          PROVENANCE_BUNDLE: ${{ steps.provenance.outputs.bundle-path }}
          SBOM_BUNDLE: ${{ steps.sbom.outputs.bundle-path }}
        run: |
          set -euo pipefail
          release_dir="$RUNNER_TEMP/release"
          provenance="$release_dir/yanxu-$VERSION.provenance.jsonl"
          sbom_attestation="$release_dir/yanxu-$VERSION.sbom-attestation.jsonl"
          cp "$PROVENANCE_BUNDLE" "$provenance"
          cp "$SBOM_BUNDLE" "$sbom_attestation"
          test -s "$provenance"
          test -s "$sbom_attestation"
          gh release upload "$TAG" \
            "$release_dir/"*.cdx.json \
            "$provenance" "$sbom_attestation" \
            --repo "$REPOSITORY" --clobber

  publish-release:
    name: 发布完整 Release
    needs: [validate, binaries, supply-chain]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: read
    steps:
      - name: 确认全部制品成功后公开 Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ needs.validate.outputs.tag }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "$TAG" --repo "$REPOSITORY" --dir dist
          test "$(find dist -maxdepth 1 -type f | wc -l)" -eq 24
          test "$(find dist -maxdepth 1 -name '*.cdx.json' -type f | wc -l)" -eq 4
          sbom="dist/yanxu-$VERSION.cdx.json"
          provenance="dist/yanxu-$VERSION.provenance.jsonl"
          sbom_attestation="dist/yanxu-$VERSION.sbom-attestation.jsonl"
          test -s "$sbom"
          test -s "$provenance"
          test -s "$sbom_attestation"
          for component_sbom in dist/*.cdx.json; do
            jq -e '.bomFormat == "CycloneDX" and .specVersion == "1.5" and (.dependencies | length) > 0' \
              "$component_sbom" >/dev/null
            if grep -F "$GITHUB_WORKSPACE" "$component_sbom"; then
              echo "SBOM 含构建机绝对路径：$component_sbom" >&2
              exit 1
            fi
          done
          lock_sha="$(sha256sum Cargo.lock | awk '{print $1}')"
          jq -e --arg version "$VERSION" --arg commit "${{ needs.validate.outputs.commit }}" --arg lock "$lock_sha" \
            '.bomFormat == "CycloneDX" and .specVersion == "1.5"
             and .metadata.component.version == $version
             and ([.metadata.properties[] | select(.name == "cdx:yanxu:source:commit" and .value == $commit)] | length) == 1
             and ([.metadata.properties[] | select(.name == "cdx:yanxu:cargo-lock:sha256" and .value == $lock)] | length) == 1' \
            "$sbom" >/dev/null
          targets=(
            x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu
            x86_64-apple-darwin aarch64-apple-darwin
            x86_64-pc-windows-msvc aarch64-pc-windows-msvc
          )
          for target in "${targets[@]}"; do
            case "$target" in *windows*) archive="yanxu-$target.zip" ;; *) archive="yanxu-$target.tar.gz" ;; esac
            test -f "dist/$archive"
            test -f "dist/yanxu-$target.sha256"
            (cd dist && sha256sum --check "yanxu-$target.sha256")
            metadata="dist/yanxu-$target.build.json"
            test -s "$metadata"
            archive_sha="$(sha256sum "dist/$archive" | awk '{print $1}')"
            jq -e \
              --arg version "$VERSION" \
              --arg commit "${{ needs.validate.outputs.commit }}" \
              --arg ref "refs/tags/$TAG" \
              --arg target "$target" \
              --arg archive "$archive" \
              --arg archive_sha "$archive_sha" \
              --arg lock "$lock_sha" \
              '.schema_version == 1 and .version == $version
               and .source.commit_sha == $commit and .source.ref == $ref
               and .artifact.name == $archive and .artifact.sha256 == $archive_sha
               and .build.target == $target and .build.profile == "release" and .build.locked
               and .build.cargo_lock_sha256 == $lock
               and .binary.version_info.version == $version
               and .binary.version_info.commit_sha == $commit
               and .binary.version_info.build_target == $target
               and .binary.version_info.build_mode == "release"' \
              "$metadata" >/dev/null
            gh attestation verify "dist/$archive" --repo "$REPOSITORY" \
              --bundle "$provenance" --source-digest "${{ needs.validate.outputs.commit }}" >/dev/null
          done
          gh release edit "$TAG" --repo "$REPOSITORY" --draft=false --title "言序 $VERSION"

  verify-published:
    name: 发布后安装 · ${{ matrix.target }}
    needs: [validate, publish-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ needs.validate.outputs.tag }}
      - name: 通过安装脚本安装并核对版本
        if: runner.os != 'Windows'
        shell: sh
        env:
          YANXU_VERSION: ${{ needs.validate.outputs.version }}
          YANXU_INSTALL_DIR: ${{ runner.temp }}/言序 发布验证/bin
          YANXU_GITHUB_TOKEN: ${{ github.token }}
        run: |
          sh scripts/install.sh
          test "$("$YANXU_INSTALL_DIR/yanxu" --version)" = "言序 $YANXU_VERSION"
      - name: 通过 PowerShell 安装并核对版本
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          YANXU_VERSION: ${{ needs.validate.outputs.version }}
          YANXU_INSTALL_DIR: ${{ runner.temp }}\言序 发布验证\bin
          YANXU_GITHUB_TOKEN: ${{ github.token }}
        run: |
          & scripts/install.ps1
          $actual = & (Join-Path $env:YANXU_INSTALL_DIR "yanxu.exe") --version
          if ($actual -ne "言序 $env:YANXU_VERSION") { throw "版本不符：$actual" }

  quarantine-release:
    name: 安装失败时撤销稳定版本资格
    if: ${{ always() && needs.verify-published.result != 'success' }}
    needs: [validate, publish-release, verify-published]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 标记为预发布并使工作流失败
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh release edit "$TAG" --repo "$REPOSITORY" --prerelease --latest=false
          echo "至少一个目标架构的发布后安装失败，Release 已撤销稳定最新版资格。" >&2
          exit 1

  finalize-release:
    name: 确认稳定 Release
    needs: [validate, verify-published]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 设置唯一稳定最新版
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: gh release edit "$TAG" --repo "$REPOSITORY" --prerelease=false --latest
