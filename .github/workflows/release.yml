name: Release

on:
  push:
    tags:
      - "v[0-9]+.*"
  workflow_dispatch:
    inputs:
      tag:
        description: 已存在的版本标签（如 v1.0.0）
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: 已存在的版本标签
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: yanxu-stable-release
  cancel-in-progress: false

jobs:
  validate:
    name: 校验版本标签
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      commit: ${{ steps.version.outputs.commit }}
      attestation_digest: ${{ steps.version.outputs.attestation_digest }}
      attestation_ref: ${{ steps.version.outputs.attestation_ref }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref_name }}
      - name: 核对 Cargo、标签、主分支与变更记录
        id: version
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          tag="${REQUESTED_TAG:-$GITHUB_REF_NAME}"
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "yanxu") | .version')"
          package_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "yanxu-package") | .version')"
          tree_sitter_version="$(jq -r '.version' tree-sitter-yanxu/package.json)"
          if [[ "$tag" != "v$version" ]]; then
            echo "标签 $tag 与 Cargo 版本 $version 不一致" >&2
            exit 1
          fi
          if [[ "$package_version" != "$version" || "$tree_sitter_version" != "$version" ]]; then
            echo "核心 $version、共享包 $package_version、Tree-sitter $tree_sitter_version 版本不一致" >&2
            exit 1
          fi
          git fetch origin main --tags
          tag_commit="$(git rev-list -n 1 "$tag")"
          main_commit="$(git rev-parse origin/main)"
          if ! git merge-base --is-ancestor "$tag_commit" "$main_commit"; then
            echo "标签 $tag 的提交 $tag_commit 不属于 origin/main 主线" >&2
            exit 1
          fi
          case "$GITHUB_REF" in
            refs/heads/main|"refs/tags/$tag") ;;
            *) echo "发行工作流只能从 main 或目标标签触发，当前为 $GITHUB_REF" >&2; exit 1 ;;
          esac
          attestation_digest="$tag_commit"
          if [[ "$GITHUB_SHA" != "$tag_commit" ]]; then
            if [[ "$GITHUB_REF" != "refs/heads/main" || "$GITHUB_SHA" != "$main_commit" ]]; then
              echo "既有标签只能从最新 main 恢复" >&2
              exit 1
            fi
            unexpected_paths="$(
              git diff --name-only "$tag_commit" "$GITHUB_SHA" |
                while IFS= read -r path; do
                  case "$path" in
                    .github/workflows/auto-release.yml|.github/workflows/dynamic-safety.yml|.github/workflows/release.yml) ;;
                    *) printf '%s\n' "$path" ;;
                  esac
                done
            )"
            if [[ -n "$unexpected_paths" ]]; then
              echo "既有标签之后包含非发行工作流变更，拒绝恢复：" >&2
              printf '%s\n' "$unexpected_paths" >&2
              exit 1
            fi
            attestation_digest="$GITHUB_SHA"
          fi
          if ! grep -Fqx "## $version" CHANGELOG.md; then
            echo "CHANGELOG.md 缺少 ## $version" >&2
            exit 1
          fi
          {
            echo "tag=$tag"
            echo "version=$version"
            echo "commit=$tag_commit"
            echo "attestation_digest=$attestation_digest"
            echo "attestation_ref=$GITHUB_REF"
          } >> "$GITHUB_OUTPUT"

  quality:
    name: 标签提交完整质量门禁
    needs: validate
    uses: ./.github/workflows/quality.yml
    with:
      ref: refs/tags/${{ needs.validate.outputs.tag }}

  dynamic-safety:
    name: 标签提交动态安全门禁
    needs: validate
    uses: ./.github/workflows/dynamic-safety.yml
    with:
      ref: refs/tags/${{ needs.validate.outputs.tag }}

  create-release:
    name: 创建 Release
    needs: [validate, quality, dynamic-safety]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ needs.validate.outputs.tag }}
      - name: 检查 Release 是否已存在
        id: state
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          set -euo pipefail
          # GraphQL variables must reach gh literally.
          # shellcheck disable=SC2016
          state="$(gh api graphql \
            -f owner="$GITHUB_REPOSITORY_OWNER" \
            -f name="${GITHUB_REPOSITORY#*/}" \
            -f tag="$TAG" \
            -f query='query($owner: String!, $name: String!, $tag: String!) {
              repository(owner: $owner, name: $name) {
                release(tagName: $tag) { isDraft isPrerelease }
              }
            }' \
            --jq '.data.repository.release |
              if . == null then "missing"
              elif .isDraft then "draft"
              elif .isPrerelease then "prerelease"
              else "stable" end')"
          if [[ "$state" == "stable" ]]; then
            echo "稳定 Release $TAG 已存在，拒绝覆盖公开资产" >&2
            exit 1
          fi
          if [[ "$state" == "prerelease" ]]; then
            gh release edit "$TAG" --draft=true --latest=false
          fi
          echo "state=$state" >> "$GITHUB_OUTPUT"
      - name: 从变更记录创建 Release
        if: steps.state.outputs.state == 'missing'
        uses: taiki-e/create-gh-release-action@eba8ea96c86cca8a37f1b56e94b4d13301fba651 # v1
        with:
          ref: refs/tags/${{ needs.validate.outputs.tag }}
          changelog: CHANGELOG.md
          title: 言序 ${{ needs.validate.outputs.version }}
          draft: true
          branch: main

  binaries:
    name: ${{ matrix.target }}
    needs: [validate, quality, create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ needs.validate.outputs.tag }}
      - name: 构建并封装（Unix）
        if: runner.os != 'Windows'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          cargo build --release --locked --target "$TARGET" --bin yanxu
          stage="$RUNNER_TEMP/yanxu-$TARGET"
          mkdir -p "$stage" dist
          install -m 755 "target/$TARGET/release/yanxu" "$stage/yanxu"
          install -m 644 LICENSE README.md "$stage/"
          tar -C "$stage" -czf "dist/yanxu-$TARGET.tar.gz" yanxu LICENSE README.md
      - name: 构建并封装（Windows）
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
        run: |
          cargo build --release --locked --target $env:TARGET --bin yanxu
          if ($LASTEXITCODE -ne 0) { throw "言序发行构建失败" }
          $Stage = Join-Path $env:RUNNER_TEMP "yanxu-$env:TARGET"
          $Dist = Join-Path $env:GITHUB_WORKSPACE "dist"
          New-Item -ItemType Directory -Force -Path $Stage, $Dist | Out-Null
          Copy-Item "target/$env:TARGET/release/yanxu.exe", LICENSE, README.md $Stage
          $ArchiveEntries = @(
            (Join-Path $Stage "yanxu.exe")
            (Join-Path $Stage "LICENSE")
            (Join-Path $Stage "README.md")
          )
          $Archive = Join-Path $Dist "yanxu-$env:TARGET.zip"
          Compress-Archive -Path $ArchiveEntries -DestinationPath $Archive
      - name: 在目标架构运行发行二进制
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          suffix=""
          if [[ "$RUNNER_OS" == "Windows" ]]; then suffix=".exe"; fi
          binary="target/$TARGET/release/yanxu$suffix"
          test -f "$binary"
          if [[ "$RUNNER_OS" != "Windows" ]]; then test -x "$binary"; fi
          test "$("$binary" --version | tr -d '\r')" = "言序 $VERSION"
      - name: 核对 Windows 发行运行时栈保留量
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
        run: |
          $bytes = [IO.File]::ReadAllBytes("target/$env:TARGET/release/yanxu.exe")
          $peOffset = [int][BitConverter]::ToUInt32($bytes, 0x3c)
          $optionalHeader = $peOffset + 24
          $magic = [BitConverter]::ToUInt16($bytes, $optionalHeader)
          if ($magic -ne 0x20b) { throw "发行运行时不是 PE32+" }
          $stackReserve = [BitConverter]::ToUInt64($bytes, $optionalHeader + 0x48)
          if ($stackReserve -lt 8MB) {
            throw "Windows 发行运行时栈只保留 $stackReserve 字节"
          }
      - name: 生成校验和与目标构建元数据
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          YANXU_SOURCE_REF: refs/tags/${{ needs.validate.outputs.tag }}
        run: |
          set -euo pipefail
          case "$TARGET" in
            *windows*) archive="dist/yanxu-$TARGET.zip"; binary="target/$TARGET/release/yanxu.exe" ;;
            *) archive="dist/yanxu-$TARGET.tar.gz"; binary="target/$TARGET/release/yanxu" ;;
          esac
          test -f "$archive"
          if command -v sha256sum >/dev/null 2>&1; then
            archive_sha="$(sha256sum "$archive" | awk '{print $1}')"
          else
            archive_sha="$(shasum -a 256 "$archive" | awk '{print $1}')"
          fi
          printf '%s  %s\n' "$archive_sha" "$(basename "$archive")" \
            > "dist/yanxu-$TARGET.sha256"
          metadata="dist/yanxu-$TARGET.build.json"
          scripts/generate-build-metadata.sh "$TARGET" "$archive" "$binary" "$metadata"
      - name: 保存平台制品
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-yanxu-platform-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7
          overwrite: true

  supply-chain:
    name: SBOM 与构建证明
    needs: [validate, binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ needs.validate.outputs.tag }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-yanxu-platform-*
          path: ${{ runner.temp }}/release
          merge-multiple: true
      - name: 安装 SBOM 工具
        uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-cyclonedx@0.5.9
      - name: 汇总目标制品并生成 SBOM
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          release_dir="$RUNNER_TEMP/release"
          test "$(find "$release_dir" -maxdepth 1 -type f | wc -l)" -eq 18
          scripts/generate-sbom.sh "$release_dir/yanxu-$VERSION.cdx.json"
      - name: 创建构建来源证明
        id: provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            ${{ runner.temp }}/release/*.tar.gz
            ${{ runner.temp }}/release/*.zip
            ${{ runner.temp }}/release/*.sha256
            ${{ runner.temp }}/release/*.build.json
            ${{ runner.temp }}/release/*.cdx.json
      - name: 创建 SBOM 证明
        id: sbom
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            ${{ runner.temp }}/release/*.tar.gz
            ${{ runner.temp }}/release/*.zip
          sbom-path: ${{ runner.temp }}/release/yanxu-${{ needs.validate.outputs.version }}.cdx.json
      - name: 准备 SBOM 与可下载证明
        shell: bash
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          PROVENANCE_BUNDLE: ${{ steps.provenance.outputs.bundle-path }}
          SBOM_BUNDLE: ${{ steps.sbom.outputs.bundle-path }}
        run: |
          set -euo pipefail
          release_dir="$RUNNER_TEMP/release"
          provenance="$release_dir/yanxu-$VERSION.provenance.jsonl"
          sbom_attestation="$release_dir/yanxu-$VERSION.sbom-attestation.jsonl"
          cp "$PROVENANCE_BUNDLE" "$provenance"
          cp "$SBOM_BUNDLE" "$sbom_attestation"
          test -s "$provenance"
          test -s "$sbom_attestation"
      - name: 保存供应链制品
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-yanxu-supply-chain
          path: |
            ${{ runner.temp }}/release/*.cdx.json
            ${{ runner.temp }}/release/*.jsonl
          if-no-files-found: error
          retention-days: 7
          overwrite: true

  publish-release:
    name: 发布完整 Release
    needs: [validate, binaries, supply-chain]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ needs.validate.outputs.tag }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-yanxu-platform-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-yanxu-supply-chain
          path: dist
      - name: 验证并上传全部发行资产
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ needs.validate.outputs.tag }}
          VERSION: ${{ needs.validate.outputs.version }}
          COMMIT_SHA: ${{ needs.validate.outputs.commit }}
          ATTESTATION_DIGEST: ${{ needs.validate.outputs.attestation_digest }}
          ATTESTATION_REF: ${{ needs.validate.outputs.attestation_ref }}
        run: |
          set -euo pipefail
          targets=(
            x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu
            x86_64-apple-darwin aarch64-apple-darwin
            x86_64-pc-windows-msvc aarch64-pc-windows-msvc
          )
          cargo_metadata="$(cargo metadata --no-deps --format-version 1)"
          package_version="$(jq -er '.packages[] | select(.name == "yanxu-package") | .version' <<<"$cargo_metadata")"
          native_v1_version="$(jq -er '.packages[] | select(.name == "yanxu-native-example") | .version' <<<"$cargo_metadata")"
          native_v2_version="$(jq -er '.packages[] | select(.name == "yanxu-native-v2-example") | .version' <<<"$cargo_metadata")"
          component_names=(yanxu yanxu-package yanxu-native-example yanxu-native-v2-example)
          component_versions=("$VERSION" "$package_version" "$native_v1_version" "$native_v2_version")
          component_sboms=(
            "yanxu-$VERSION.cdx.json"
            "yanxu-package-$package_version.cdx.json"
            "yanxu-native-example-$native_v1_version.cdx.json"
            "yanxu-native-v2-example-$native_v2_version.cdx.json"
          )
          provenance="dist/yanxu-$VERSION.provenance.jsonl"
          sbom_attestation="dist/yanxu-$VERSION.sbom-attestation.jsonl"
          test -s "$provenance"
          test -s "$sbom_attestation"
          provenance_subjects=()
          expected_assets=(
            "yanxu-$VERSION.provenance.jsonl"
            "yanxu-$VERSION.sbom-attestation.jsonl"
          )
          for target in "${targets[@]}"; do
            case "$target" in *windows*) archive="yanxu-$target.zip" ;; *) archive="yanxu-$target.tar.gz" ;; esac
            for asset in "$archive" "yanxu-$target.sha256" "yanxu-$target.build.json"; do
              test -s "dist/$asset"
              provenance_subjects+=("$asset")
              expected_assets+=("$asset")
            done
          done
          for component_sbom in "${component_sboms[@]}"; do
            test -s "dist/$component_sbom"
            provenance_subjects+=("$component_sbom")
            expected_assets+=("$component_sbom")
          done
          test "${#expected_assets[@]}" -eq 24
          test "$(find dist -mindepth 1 -maxdepth 1 | wc -l)" -eq 24
          test "$(find dist -mindepth 1 -maxdepth 1 -type f | wc -l)" -eq 24

          # 任何资产内容在解析或解包前，必须先匹配本次受信任发行工作流的构建来源证明。
          for subject in "${provenance_subjects[@]}"; do
            gh attestation verify "dist/$subject" --repo "$REPOSITORY" \
              --signer-workflow "$REPOSITORY/.github/workflows/release.yml" \
              --bundle "$provenance" \
              --source-digest "$ATTESTATION_DIGEST" \
              --source-ref "$ATTESTATION_REF" >/dev/null
          done

          lock_sha="$(sha256sum Cargo.lock | awk '{print $1}')"
          for index in "${!component_sboms[@]}"; do
            component_sbom="dist/${component_sboms[$index]}"
            component_name="${component_names[$index]}"
            component_version="${component_versions[$index]}"
            jq -e \
              --arg name "$component_name" \
              --arg version "$component_version" \
              --arg commit "$COMMIT_SHA" \
              --arg lock "$lock_sha" \
              '.bomFormat == "CycloneDX" and .specVersion == "1.5"
              and (.serialNumber | test("^urn:uuid:[0-9a-f]{8}-[0-9a-f]{4}-8[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"))
              and .metadata.component.name == $name
              and .metadata.component.version == $version
              and (.dependencies | length) > 0
              and ([.metadata.properties[] |
                select(.name == "cdx:yanxu:source:commit" and .value == $commit)] | length) == 1
              and ([.metadata.properties[] |
                select(.name == "cdx:yanxu:cargo-lock:sha256" and .value == $lock)] | length) == 1' \
              "$component_sbom" >/dev/null
            if grep -F "$GITHUB_WORKSPACE" "$component_sbom"; then
              echo "SBOM 含构建机绝对路径：$component_sbom" >&2
              exit 1
            fi
          done
          for target in "${targets[@]}"; do
            case "$target" in *windows*) archive="yanxu-$target.zip" ;; *) archive="yanxu-$target.tar.gz" ;; esac
            checksum="dist/yanxu-$target.sha256"
            test "$(wc -l < "$checksum")" -eq 1
            if LC_ALL=C grep -q $'\r' "$checksum"; then
              echo "yanxu-$target.sha256 不得包含 CR 字节" >&2
              exit 1
            fi
            checksum_value="$(awk '{print $1}' "$checksum")"
            checksum_name="$(awk '{print $2}' "$checksum")"
            if ! [[ "$checksum_value" =~ ^[0-9a-f]{64}$ ]] || [[ "$checksum_name" != "$archive" ]]; then
              echo "yanxu-$target.sha256 格式或资产名不正确" >&2
              exit 1
            fi
            (cd dist && sha256sum --check "yanxu-$target.sha256")
            case "$archive" in
              *.zip) archive_entries="$(unzip -Z1 "dist/$archive" | LC_ALL=C sort)"; expected_entries=$'LICENSE\nREADME.md\nyanxu.exe' ;;
              *) archive_entries="$(tar -tzf "dist/$archive" | LC_ALL=C sort)"; expected_entries=$'LICENSE\nREADME.md\nyanxu' ;;
            esac
            if [[ "$archive_entries" != "$expected_entries" ]]; then
              echo "$archive 的归档条目不符合发行允许清单" >&2
              exit 1
            fi
            metadata="dist/yanxu-$target.build.json"
            extracted="$RUNNER_TEMP/yanxu-release-$target"
            mkdir -p "$extracted"
            case "$archive" in
              *.zip) unzip -q "dist/$archive" -d "$extracted" ;;
              *) tar -xzf "dist/$archive" -C "$extracted" ;;
            esac
            binary_name="yanxu"
            case "$target" in *windows*) binary_name="yanxu.exe" ;; esac
            test "$(find "$extracted" -mindepth 1 -maxdepth 1 | wc -l)" -eq 3
            test "$(find "$extracted" -mindepth 1 -maxdepth 1 -type f | wc -l)" -eq 3
            binary="$extracted/$binary_name"
            test -f "$binary"
            test -f "$extracted/LICENSE"
            test -f "$extracted/README.md"
            if [[ "$target" != *windows* ]]; then test -x "$binary"; fi
            binary_sha="$(sha256sum "$binary" | awk '{print $1}')"
            binary_bytes="$(wc -c < "$binary" | tr -d ' ')"
            archive_sha="$(sha256sum "dist/$archive" | awk '{print $1}')"
            archive_bytes="$(wc -c < "dist/$archive" | tr -d ' ')"
            jq -e \
              --arg version "$VERSION" \
              --arg repository "$REPOSITORY" \
              --arg commit "$COMMIT_SHA" \
              --arg ref "refs/tags/$TAG" \
              --arg target "$target" \
              --arg archive "$archive" \
              --arg archive_sha "$archive_sha" \
              --argjson archive_bytes "$archive_bytes" \
              --arg binary "$binary_name" \
              --arg binary_sha "$binary_sha" \
              --argjson binary_bytes "$binary_bytes" \
              --arg lock "$lock_sha" \
              '.schema_version == 1 and .version == $version
               and .source.repository == $repository
               and .source.commit_sha == $commit and .source.ref == $ref
               and .artifact.name == $archive and .artifact.sha256 == $archive_sha
               and .artifact.bytes == $archive_bytes
               and .binary.name == $binary
               and .binary.sha256 == $binary_sha and .binary.bytes == $binary_bytes
               and .build.target == $target and .build.profile == "release" and .build.locked
               and .build.cargo_lock_sha256 == $lock
               and .binary.version_info.version == $version
               and .binary.version_info.commit_sha == $commit
               and .binary.version_info.build_target == $target
               and .binary.version_info.build_mode == "release"' \
              "$metadata" >/dev/null
            gh attestation verify "dist/$archive" --repo "$REPOSITORY" \
              --signer-workflow "$REPOSITORY/.github/workflows/release.yml" \
              --bundle "$sbom_attestation" \
              --predicate-type "https://cyclonedx.org/bom" \
              --source-digest "$ATTESTATION_DIGEST" \
              --source-ref "$ATTESTATION_REF" >/dev/null
          done
          release_state="$(gh release view "$TAG" --repo "$REPOSITORY" \
            --json isDraft,isPrerelease \
            --jq 'if .isDraft then "draft" elif .isPrerelease then "prerelease" else "stable" end')"
          case "$release_state" in
            draft) ;;
            prerelease) gh release edit "$TAG" --repo "$REPOSITORY" --draft=true --latest=false ;;
            *) echo "稳定 Release $TAG 已存在，拒绝覆盖公开资产" >&2; exit 1 ;;
          esac
          test "$(gh release view "$TAG" --repo "$REPOSITORY" --json isDraft --jq .isDraft)" = "true"
          gh release upload "$TAG" dist/* --repo "$REPOSITORY" --clobber
          expected_remote="$(printf '%s\n' "${expected_assets[@]}" | LC_ALL=C sort)"
          actual_remote="$(gh release view "$TAG" --repo "$REPOSITORY" --json assets --jq '.assets[].name' | LC_ALL=C sort)"
          if [[ "$actual_remote" != "$expected_remote" ]]; then
            echo "草稿 Release 的远程资产集合不完整或包含额外文件" >&2
            exit 1
          fi
          remote_dir="$RUNNER_TEMP/yanxu-release-uploaded"
          mkdir -p "$remote_dir"
          gh release download "$TAG" --repo "$REPOSITORY" --dir "$remote_dir"
          test "$(find "$remote_dir" -mindepth 1 -maxdepth 1 -type f | wc -l)" -eq 24
          for asset in "${expected_assets[@]}"; do
            cmp -- "dist/$asset" "$remote_dir/$asset"
          done
          gh release edit "$TAG" --repo "$REPOSITORY" \
            --draft=false --prerelease=true --latest=false --title "言序 $VERSION"
          test "$(gh release view "$TAG" --repo "$REPOSITORY" \
            --json isDraft,isPrerelease,assets \
            --jq '.isDraft == false and .isPrerelease == true and (.assets | length) == 24')" = "true"

  verify-published:
    name: 发布后安装 · ${{ matrix.target }}
    needs: [validate, publish-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-24.04
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            runner: macos-15-intel
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
          - target: aarch64-pc-windows-msvc
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ needs.validate.outputs.tag }}
      - name: 通过安装脚本安装并核对版本
        if: runner.os != 'Windows'
        shell: sh
        env:
          YANXU_VERSION: ${{ needs.validate.outputs.version }}
          YANXU_INSTALL_DIR: ${{ runner.temp }}/言序 发布验证/bin
          YANXU_GITHUB_TOKEN: ${{ github.token }}
        run: |
          sh scripts/install.sh
          test "$("$YANXU_INSTALL_DIR/yanxu" --version)" = "言序 $YANXU_VERSION"
      - name: 通过 PowerShell 安装并核对版本
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          YANXU_VERSION: ${{ needs.validate.outputs.version }}
          YANXU_INSTALL_DIR: ${{ runner.temp }}\言序 发布验证\bin
          YANXU_GITHUB_TOKEN: ${{ github.token }}
        run: |
          & scripts/install.ps1
          $actual = & (Join-Path $env:YANXU_INSTALL_DIR "yanxu.exe") --version
          if ($actual -ne "言序 $env:YANXU_VERSION") { throw "版本不符：$actual" }

  quarantine-release:
    name: 安装失败时撤销稳定版本资格
    if: ${{ always() && needs.publish-release.result == 'success' && needs.verify-published.result != 'success' }}
    needs: [validate, publish-release, verify-published]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 标记为预发布并使工作流失败
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh release edit "$TAG" --repo "$REPOSITORY" --prerelease --latest=false
          echo "至少一个目标架构的发布后安装失败，Release 已撤销稳定最新版资格。" >&2
          exit 1

  finalize-release:
    name: 确认稳定 Release
    needs: [validate, verify-published]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 设置唯一稳定最新版
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          latest_tag="$(gh release view --repo "$REPOSITORY" --json tagName --jq .tagName)"
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || \
             ! [[ "$latest_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "当前标签或既有 latest 标签不是稳定语义版本" >&2
            exit 1
          fi
          greatest_tag="$(printf '%s\n%s\n' "$latest_tag" "$TAG" | sort -V | tail -n 1)"
          if [[ "$TAG" == "$latest_tag" || "$TAG" == "$greatest_tag" ]]; then
            promote_latest=true
          else
            promote_latest=false
          fi
          release_state="$(gh release view "$TAG" --repo "$REPOSITORY" \
            --json isDraft,isPrerelease,assets \
            --jq 'if .isDraft or (.assets | length) != 24 then "invalid"
                  elif .isPrerelease then "prerelease" else "stable" end')"
          case "$release_state" in
            prerelease|stable)
              if [[ "$promote_latest" == "true" ]]; then
                gh release edit "$TAG" --repo "$REPOSITORY" --prerelease=false --latest
              else
                gh release edit "$TAG" --repo "$REPOSITORY" --prerelease=false --latest=false
              fi
              ;;
            *) echo "Release 状态或资产集合不满足正式发布条件" >&2; exit 1 ;;
          esac
          test "$(gh release view "$TAG" --repo "$REPOSITORY" \
            --json isDraft,isPrerelease,assets \
            --jq '.isDraft == false and .isPrerelease == false and (.assets | length) == 24')" = "true"
          final_latest="$(gh release view --repo "$REPOSITORY" --json tagName --jq .tagName)"
          if [[ "$promote_latest" == "true" ]]; then
            test "$final_latest" = "$TAG"
          else
            test "$final_latest" = "$latest_tag"
          fi
