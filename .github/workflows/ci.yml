name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: Rust · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: 准备 Rust 工具链
        run: rustup component add rustfmt clippy
      - name: 检查格式
        run: cargo fmt --check
      - name: 运行测试
        run: cargo test --all-targets --locked
      - name: 运行 Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

  wasi:
    name: WASI 嵌入构建
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: 准备 WASI 目标
        run: rustup target add wasm32-wasip1
      - name: 检查 WASI 库
        run: cargo check --target wasm32-wasip1 --lib --locked

  installer:
    name: 安装器 · ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: 验证 macOS / Linux 安装器
        if: runner.os != 'Windows'
        shell: sh
        env:
          YANXU_INSTALL_DIR: ${{ runner.temp }}/yanxu/bin
        run: |
          sh -n scripts/install.sh
          sh scripts/install.sh
          "$YANXU_INSTALL_DIR/yanxu" --version
      - name: 验证 Windows 安装器
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          YANXU_INSTALL_DIR: ${{ runner.temp }}\yanxu\bin
        run: |
          $errors = $null
          [void][System.Management.Automation.Language.Parser]::ParseFile(
            (Resolve-Path scripts/install.ps1), [ref]$null, [ref]$errors
          )
          if ($errors.Count) { $errors | Format-List; exit 1 }
          & scripts/install.ps1
          & (Join-Path $env:YANXU_INSTALL_DIR "yanxu.exe") --version
