[package]
name = "yanxu"
version = "1.0.0"
edition = "2024"
description = "言序：以 Rust 编写的文言风格解释型编程语言"
license = "MIT"
repository = "https://github.com/YanXuLang/yanxu"
homepage = "https://yanxu.dev/"
documentation = "https://docs.yanxu.dev/"
readme = "README.md"
keywords = ["language", "interpreter", "chinese", "programming-language"]
categories = ["compilers", "command-line-utilities"]
include = [
    "/src/**",
    "/tests/**",
    "/Cargo.toml",
    "/Cargo.lock",
    "/README.md",
    "/COMPATIBILITY.md",
    "/CONTRIBUTING.md",
    "/LICENSE",
    "/CHANGELOG.md",
    "/examples/**",
    "/spec/**",
    "/schemas/**",
    "/compat/**",
    "/stdlib/**",
    "/include/**",
    "/fuzz/**",
    "/proposals/**",
    "/reference/**",
    "/tree-sitter-yanxu/**",
    "/言序.toml",
]

[lib]
name = "yanxu"
path = "src/lib.rs"
crate-type = ["rlib", "cdylib"]

[[bin]]
name = "yanxu"
path = "src/main.rs"

[dependencies]
semver = "1.0"
serde = { version = "1.0", features = ["derive", "rc"] }
serde_json = "1.0"
sha2 = "0.10"
toml = "0.8"

[target.'cfg(not(target_family = "wasm"))'.dependencies]
rustyline = "18.0.1"
